<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Sales | Odontologia</title>
  <style>
    @font-face {
      font-family: "Valentine Delight";
      src: url("./Valentine Delight.ttf") format("truetype");
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    :root {
      --bg: #07111a;
      --bg-soft: #0c1824;
      --panel: rgba(9, 18, 28, 0.72);
      --panel-line: rgba(255, 255, 255, 0.08);
      --text: #f5f7fa;
      --muted: rgba(245, 247, 250, 0.68);
      --accent: #c9a96a;
      --accent-soft: #e3c791;
      --track: rgba(255, 255, 255, 0.08);
      --progress: 77.78%;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(201, 169, 106, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(201, 169, 106, 0.10), transparent 28%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg-soft) 55%, #060d14 100%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px 18px;
    }

    .shell {
      width: 100%;
      max-width: 1120px;
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
    }

    .hero {
      width: 100%;
      max-width: 920px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--panel-line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 72px 56px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(201, 169, 106, 0.08), transparent),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 106, 0.10), transparent 65%);
      top: -180px;
      right: -140px;
      filter: blur(10px);
      pointer-events: none;
    }

    .hero::marker {
      content: "";
    }

    

    h1::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -8px;
      width: min(180px, 42%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,106,0.85), transparent);
      opacity: 0.65;
    }

    .label {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid rgba(201, 169, 106, 0.28);
      border-radius: 999px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.72rem;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.02);
    }

    .label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      box-shadow: 0 0 18px rgba(201, 169, 106, 0.65);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-family: "Valentine Delight", cursive;
      font-size: clamp(3rem, 7vw, 5.2rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      line-height: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(235,220,190,0.95) 60%, rgba(201,169,106,0.9) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-shadow: 0 0 10px rgba(201,169,106,0.08);
      animation: nameFloat 4.8s ease-in-out infinite;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.45em;
      color: var(--muted);
    }

    .message {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 34px auto 0;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: clamp(1.45rem, 2.8vw, 2rem);
      line-height: 1.5;
      color: rgba(245, 247, 250, 0.94);
    }

    .divider {
      position: relative;
      z-index: 1;
      width: min(180px, 48%);
      height: 1px;
      margin: 34px auto 0;
      background: linear-gradient(90deg, transparent, rgba(201, 169, 106, 0.9), transparent);
    }

    .progress-card {
      position: relative;
      z-index: 1;
      margin: 42px auto 0;
      max-width: 680px;
      padding: 28px 26px 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-head strong {
      color: var(--text);
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.11));
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(153,118,56,0.95) 0%, rgba(201,169,106,0.98) 52%, rgba(236,214,171,0.98) 100%);
      box-shadow: 0 0 12px rgba(201, 169, 106, 0.18), 0 0 20px rgba(201, 169, 106, 0.10);
      transform-origin: left center;
      animation: loading 1.6s ease-out forwards, breathing 3.8s ease-in-out infinite 1.6s;
      position: relative;
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.38) 45%, transparent 75%);
      animation: shimmer 3s linear infinite;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .footer-note strong {
      color: var(--text);
      font-weight: 600;
    }

    @keyframes loading {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @keyframes shimmer {
      from { transform: translateX(-130%); }
      to { transform: translateX(180%); }
    }

    @keyframes breathing {
      0%, 100% {
        box-shadow: 0 0 16px rgba(201, 169, 106, 0.16);
        filter: brightness(0.96);
      }
      50% {
        box-shadow: 0 0 28px rgba(201, 169, 106, 0.32);
        filter: brightness(1.08);
      }
    }

    @keyframes nameFloat {
      0%, 100% {
        transform: translateY(0px);
        text-shadow: 0 0 18px rgba(201, 169, 106, 0.10);
      }
      50% {
        transform: translateY(-2px);
        text-shadow: 0 0 26px rgba(201, 169, 106, 0.18);
      }
    }

    @media (max-width: 720px) {
      .hero {
        padding: 52px 24px;
        border-radius: 26px;
      }

      .subtitle {
        letter-spacing: 0.3em;
      }

      .progress-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress-card {
        padding: 22px 18px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      
      <div class="label">Em construção</div>

      <h1>Felipe Sales</h1>
      <div class="subtitle">Odontologia</div>

      
      <div class="divider"></div>

      <div class="progress-card" aria-label="Progresso do curso de odontologia">
        <div class="progress-head">
          <span>Loading</span>
          <strong id="percentText">77,78%</strong>
        </div>

        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="77.78">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="footer-note">
          Uma trajetória construída com precisão, constância e propósito.
        </div>
      </div>
    </section>
  </main>
  <script>
    const startProgress = 77.78;
    const endProgress = 100;

    const startDate = new Date();
    const endDate = new Date("2027-07-01T00:00:00");

    const progressFill = document.getElementById("progressFill");
    const percentText = document.getElementById("percentText");

    function updateProgress(){
      const now = new Date();

      if(now >= endDate){
        progressFill.style.width = "100%";
        percentText.textContent = "100%";
        return;
      }

      const totalTime = endDate - startDate;
      const elapsed = now - startDate;

      const progressIncrease = (elapsed / totalTime) * (endProgress - startProgress);
      const currentProgress = Math.min(startProgress + progressIncrease, 100);

      progressFill.style.width = currentProgress + "%";
      percentText.textContent = currentProgress.toFixed(2).replace(".",",") + "%";
    }

    updateProgress();
    setInterval(updateProgress, 3600000);
  </script>
</body>
</html>
